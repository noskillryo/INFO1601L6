<!DOCTYPE html>
<html>
<head>
 
</head>
<body>
    <span id="result">Original content</span>

    <script>
        const result = document.querySelector('#result');
      
        console.log("Element:", result);
      
        result.innerHTML = '<h2>My Span</h2>';

        result.style.color = 'blue';
        result.style.backgroundColor = 'lightgrey';

        console.log("ID attribute:", result.getAttribute('id'));
 
        result.classList.add('content');
        console.log("Classes after adding:", result.className);
 
        setTimeout(() => {
            result.removeAttribute('id');
            console.log("ID after removal:", result.getAttribute('id'));
        }, 2000);
    </script>
</body>
</html>
